<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Hikayemiz 💖</title>

<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(to right,#ff758c,#ff7eb3);
    font-family:Arial;
    text-align:center;
    color:white;
}

.container{
    margin-top:50px;
}

img{
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
}

h1{
    font-size:35px;
}

#sayac{
    font-size:22px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4e8a;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <img src="https://i.imgur.com/4M34hi2.png">
    <h1>Canım Sevgilim 💖</h1>
    <p>Seninle geçen her saniye en güzel anım...</p>

    <div id="sayac"></div>

    <button onclick="mesaj()">Sürpriz ❤️</button>
</div>

<audio autoplay loop>
    <source src="MÜZİK-LİNKİNİ-BURAYA.mp3" type="audio/mpeg">
</audio>

<script>
var baslangic=new Date("2024-04-18 00:00:00").getTime();

setInterval(function(){
    var simdi=new Date().getTime();
    var fark=simdi-baslangic;

    var gun=Math.floor(fark/(1000*60*60*24));
    var saat=Math.floor((fark%(1000*60*60*24))/(1000*60*60));
    var dakika=Math.floor((fark%(1000*60*60))/(1000*60));
    var saniye=Math.floor((fark%(1000*60))/1000);

    document.getElementById("sayac").innerHTML=
    gun+" Gün "+saat+" Saat "+dakika+" Dakika "+saniye+" Saniyedir Birlikteyiz 💕";
},1000);

function mesaj(){
    alert("Seni Sonsuza Kadar Seveceğim ❤️");
}
</script> 
  </script>

<iframe width="0" height="0"
src="https://www.youtube.com/embed/aDju79MtUR8?autoplay=1&loop=1&playlist=aDju79MtUR8"
frameborder="0"
allow="autoplay">
</iframe>

</body>
</html>
